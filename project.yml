name: Odyssey
options:
  bundleIdPrefix: com.odyssey
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
packages:
  AppXray:
    path: Dependencies/appxray/packages/sdk-ios
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.1"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.1"
  OdysseyCore:
    path: Packages/OdysseyCore
  secp256k1:
    url: https://github.com/GigaBitcoin/secp256k1.swift
    from: "0.15.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  Odyssey:
    type: application
    platform: macOS
    sources:
      - path: Odyssey
        excludes:
          - "**/.DS_Store"
          - "Resources/DefaultSkills/**"
          - "Resources/DefaultAgents/**"
          - "Resources/SystemPromptTemplates/**"
          - "Resources/DefaultPromptTemplates/**"
          - "Resources/Catalog/**"
      - path: Odyssey/Resources/Catalog
        type: folder
      - path: Odyssey/Resources/DefaultAgents
        type: folder
      - path: Odyssey/Resources/DefaultSkills
        type: folder
      - path: Odyssey/Resources/SystemPromptTemplates
        type: folder
      - path: Odyssey/Resources/DefaultPromptTemplates
        type: folder
    dependencies:
      - package: AppXray
      - package: MarkdownUI
      - package: Highlightr
      - package: OdysseyCore
      - package: secp256k1
        product: P256K
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shaycohen.odyssey
        PRODUCT_NAME: Odyssey
        INFOPLIST_FILE: Odyssey/Resources/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Odyssey
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Odyssey uses the local network to discover and share agent definitions with peers."
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: U6BSY4N9E3
        SWIFT_EMIT_LOC_STRINGS: true
    preBuildScripts:
      - name: Bundle Local Agent Host
        path: scripts/build-local-agent-host.sh
      - name: Bundle Sidecar Binary
        path: scripts/build-sidecar-binary.sh
    entitlements:
      path: Odyssey/Resources/Odyssey.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-write: true
  OdysseyiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.odyssey.app.ios
        INFOPLIST_FILE: OdysseyiOS/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: OdysseyiOS/Resources/OdysseyiOS.entitlements
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: U6BSY4N9E3
    sources:
      - OdysseyiOS
    dependencies:
      - package: OdysseyCore
  OdysseyiOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.odyssey.ios.tests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: U6BSY4N9E3
    sources:
      - OdysseyiOSTests
    dependencies:
      - target: OdysseyiOS
      - package: OdysseyCore
  OdysseyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OdysseyTests
    dependencies:
      - target: Odyssey
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.odyssey.tests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: U6BSY4N9E3
