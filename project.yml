name: ClaudeStudio
options:
  bundleIdPrefix: com.claudestudio
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
packages:
  AppXray:
    path: Dependencies/appxray/packages/sdk-ios
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.1"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.1"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  ClaudeStudio:
    type: application
    platform: macOS
    sources:
      - path: ClaudeStudio
        excludes:
          - "**/.DS_Store"
          - "Resources/DefaultSkills/**"
          - "Resources/DefaultAgents/**"
          - "Resources/SystemPromptTemplates/**"
          - "Resources/Catalog/**"
      - path: ClaudeStudio/Resources/Catalog
        type: folder
      - path: ClaudeStudio/Resources/DefaultAgents
        type: folder
      - path: ClaudeStudio/Resources/DefaultSkills
        type: folder
      - path: ClaudeStudio/Resources/SystemPromptTemplates
        type: folder
    dependencies:
      - package: AppXray
      - package: MarkdownUI
      - package: Highlightr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestudio.app
        PRODUCT_NAME: ClaudeStudio
        INFOPLIST_FILE: ClaudeStudio/Resources/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: ClaudeStudio
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "ClaudeStudio uses the local network to discover and share agent definitions with peers."
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: true
    preBuildScripts:
      - name: Bundle Local Agent Host
        path: scripts/build-local-agent-host.sh
    entitlements:
      path: ClaudeStudio/Resources/ClaudeStudio.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.claudestudio.app
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.claudestudio.app
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)com.claudestudio.app"
  ClaudeStudioTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeStudioTests
    dependencies:
      - target: ClaudeStudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestudio.tests
        GENERATE_INFOPLIST_FILE: true
