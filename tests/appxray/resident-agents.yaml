name: Resident Agents
description: |
  E2E tests for the Resident Agents feature.
  Validates: sidebar section visibility, expand/collapse, new chat creation,
  working directory routing, and MEMORY.md seeding.

  Prerequisites:
    - Odyssey DEBUG build running (AppXray on port 19480 or auto-discovered)
    - App must be Xcode-launched (not terminal-launched) for screenshots and
      coordinate-based taps to work reliably.
    - At least one Agent with a Home Folder (defaultWorkingDirectory) set.
      Run RA-0 setup if none exists.

  Setup approach:
    RA-0 uses setState to open the "Add to Residents" sheet reliably,
    bypassing the ProxyButton tap (which is unreliable inside SwiftUI Lists).
    The setState approach is the canonical automation path for this flow.

  Known good:
    - "Add to Residents" sheet: opened via setState(appState.showAddResidentSheet, true)
    - Agent rows: addressed by @testId("sidebar.residentAgentRow.{uuid}")
    - New Chat button: @testId("sidebar.residentAgent.newChat.{uuid}")
    - MEMORY.md template: seeded by ResidentAgentSupport.seedMemoryFileIfNeeded

tests:

  # ─── SETUP ────────────────────────────────────────────────────────────────

  - name: "RA-0: Add an agent to Residents via the sheet (setup)"
    description: |
      Opens the "Add to Residents" sheet using setState (reliable automation path),
      selects the first listed agent, and confirms it appears in the sidebar.
      Skip if a resident agent already exists in the sidebar.
    steps:
      # Open the sheet via setState — more reliable than tapping the ProxyButton
      # inside the SwiftUI List (List-embedded ProxyButtons don't receive performClick reliably)
      - act:
          action: setState
          path: appState.showAddResidentSheet
          value: true
      - interact:
          action: waitFor
          condition: element
          selector: '@testId("addResidentSheet.list")'
          timeout: 3000
      - interact:
          action: screenshot
          label: "add-residents-sheet-open"
      # Tap the first agent row in the sheet
      - interact:
          action: tap
          selector: '@index(0, @type("Button"))'
      - interact:
          action: screenshot
          label: "after-agent-selected"
    assert:
      - element_exists: '@testId("sidebar.residentAgents.header")'

  # ─── SIDEBAR VISIBILITY ───────────────────────────────────────────────────

  - name: "RA-1: Add to Residents sheet opens with correct title"
    description: |
      Opens the sheet via setState and verifies the title "Add to Residents" is visible.
      Also confirms the agent list is populated (requires the predicate fix:
      $0.isResident == false && $0.isEnabled == true, NOT !$0.isResident).
    steps:
      - act:
          action: setState
          path: appState.showAddResidentSheet
          value: true
      - interact:
          action: screenshot
          label: "add-residents-sheet"
    assert:
      - screenshot_contains: "Add to Residents"

  - name: "RA-2: Add to Residents sheet lists non-resident enabled agents"
    description: |
      Verifies the sheet agent list is non-empty.
      Requires the predicate fix in AddResidentSheet @Query:
        WRONG: #Predicate<Agent> { !$0.isResident && $0.isEnabled }
        RIGHT: #Predicate<Agent> { $0.isResident == false && $0.isEnabled == true }
      The ! operator is not supported in SwiftData predicates and silently returns
      an empty result set.
    steps:
      - act:
          action: setState
          path: appState.showAddResidentSheet
          value: true
      - interact:
          action: waitFor
          condition: element
          selector: '@text("Done")'
          timeout: 3000
      - interact:
          action: screenshot
          label: "sheet-with-agents"
    assert:
      # Sheet should show agent rows, not "All agents are Residents" empty state
      - screenshot_not_contains: "All agents are Residents"
    cleanup:
      - act:
          action: setState
          path: appState.showAddResidentSheet
          value: false

  - name: "RA-3: Resident agent row is visible in sidebar"
    description: |
      Verifies the Residents section header and at least one agent row are present
      in the sidebar. Uses testId selectors against the accessibility tree.
    steps:
      - interact:
          action: screenshot
          label: "sidebar-with-resident"
    assert:
      - element_exists: '@testId("sidebar.residentAgents.header")'
      # At least one resident agent row must exist
      # The testId is sidebar.residentAgentRow.{agent-uuid} — use prefix match
      - element_exists_prefix: 'sidebar.residentAgentRow.'

  # ─── EXPAND / COLLAPSE ────────────────────────────────────────────────────

  - name: "RA-4: Resident section header is present and tappable"
    steps:
      - interact:
          action: find
          selector: '@testId("sidebar.residentAgents.header")'
      - interact:
          action: tap
          selector: '@testId("sidebar.residentAgents.header")'
      - interact:
          action: screenshot
          label: "after-header-tap"
    assert:
      - element_exists: '@testId("sidebar.residentAgents.header")'

  - name: "RA-5: Resident agent row tapping toggles expand/collapse"
    description: |
      The agent row header row toggles expandedResidentIds on tap.
      When no chats exist the expanded state shows no chat rows (empty).
      When chats exist the expanded state shows sidebar.residentChatRow.{uuid} rows.
    steps:
      # Tap once to expand
      - interact:
          action: tap
          selector: '@testId("sidebar.residentAgents.header")'
      - interact:
          action: screenshot
          label: "section-after-tap"
      # Tap again to return to original state
      - interact:
          action: tap
          selector: '@testId("sidebar.residentAgents.header")'
    assert:
      - element_exists: '@testId("sidebar.residentAgents.header")'

  # ─── NEW CHAT FROM RESIDENT ───────────────────────────────────────────────

  - name: "RA-6: New Chat button on resident row creates a conversation"
    description: |
      Taps the pencil icon button (sidebar.residentAgent.newChat.{uuid}) on the
      first resident agent row. This calls startResidentSession(with:) which:
        1. Creates a Session with workingDirectory = agent.defaultWorkingDirectory
        2. Creates a Conversation linked to that session
        3. Sets expandedResidentIds.insert(agent.id)
        4. Sets windowState.selectedConversationId = conversation.id
      Chat view should open and the message input should be visible.
    steps:
      # The new chat button testId is sidebar.residentAgent.newChat.{agent-uuid}
      - interact:
          action: tap
          selector: '@testId("sidebar.residentAgent.newChat")'
      - interact:
          action: waitFor
          condition: element
          selector: '@testId("chat.messageInput")'
          timeout: 5000
      - interact:
          action: screenshot
          label: "resident-chat-open"
    assert:
      - element_exists: '@testId("chat.messageInput")'

  - name: "RA-7: Resident chat working directory is home folder, not project root"
    description: |
      Verifies that a session created via startResidentSession has its
      workingDirectory set to the agent's defaultWorkingDirectory (home folder),
      NOT to the currently open project's rootPath.

      Root cause that was fixed: agents added to Residents before having a
      defaultWorkingDirectory set would fall back to startSession() which used the
      project root. Fix: AddResidentSheet auto-assigns Agent.defaultHomePath()
      when adding, and startResidentSession always assigns it defensively.

      The home folder path contains ".odyssey/residents/" — the project root does not.
      The inspector workspace heading should show the residents path.
    steps:
      - interact:
          action: tap
          selector: '@testId("mainWindow.inspectorToggle")'
      - interact:
          action: screenshot
          label: "inspector-workspace"
    assert:
      - element_exists: '@testId("inspector.workspaceHeading")'
      # Home folder path contains .odyssey/residents/ — project root path does not
      - screenshot_contains: ".odyssey/residents/"
      - screenshot_not_contains: "/playground"

  # ─── CONTEXT MENU ─────────────────────────────────────────────────────────

  - name: "RA-8: Context menu on resident row shows New Chat and Edit Agent"
    description: |
      Right-click (secondary click) on a resident agent row to open the context menu.
      Verifies "New Chat", "Edit Agent", and "Remove from Residents" items.
    steps:
      - interact:
          action: rightClick
          selector: '@testId("sidebar.residentAgents.header")'
      - interact:
          action: screenshot
          label: "context-menu-open"
    assert:
      - screenshot_contains: "New Chat"
      - screenshot_contains: "Edit Agent"
      - screenshot_contains: "Remove from Residents"

  # ─── AGENT EDITOR ─────────────────────────────────────────────────────────

  - name: "RA-9: Agent Editor shows Home Folder label in Workspace section"
    description: |
      Opens the agent editor for a resident agent.
      The TextField placeholder is "Home Folder" (not "Working Directory").
      testId: agentEditor.workingDirectoryField
    steps:
      - interact:
          action: tap
          selector: '@testId("sidebar.agentsButton")'
      - interact:
          action: tap
          selector: '@index(0, @testId("agentLibrary.agentRow"))'
      - interact:
          action: tap
          selector: '@testId("agentLibrary.editButton")'
      - interact:
          action: screenshot
          label: "agent-editor-home-folder"
    assert:
      - element_exists: '@testId("agentEditor.workingDirectoryField")'
      - screenshot_contains: "Home Folder"

  - name: "RA-10: Agent Editor shows MEMORY.md hint when Home Folder is set"
    description: |
      When a non-empty path is in the Home Folder field, a helper text appears:
        "MEMORY.md will be created here on first chat"
      testId: agentEditor.homeFolderHint
    steps:
      - interact:
          action: screenshot
          label: "agent-editor-hint"
    assert:
      - element_exists: '@testId("agentEditor.homeFolderHint")'
      - screenshot_contains: "MEMORY.md will be created here"

  # ─── MEMORY.MD SEEDING ────────────────────────────────────────────────────

  - name: "RA-11: MEMORY.md is created in home folder after first chat"
    description: |
      ResidentAgentSupport.seedMemoryFileIfNeeded is called from startResidentSession.
      It creates the home folder directory (intermediateDirectories: true) and writes
      MEMORY.md with the standard template (Goals / Active Context / Notes / Decisions Log).
      After opening a chat via the New Chat button, the file should exist on disk.
      Verify via the inspector Files tab or direct filesystem check.
    steps:
      # Tap Files tab in inspector
      - interact:
          action: tap
          selector: '@testId("inspector.tabFiles")'
      - interact:
          action: screenshot
          label: "inspector-files-tab"
    assert:
      - screenshot_contains: "MEMORY.md"

  # ─── HOME FOLDER AUTO-ASSIGN ───────────────────────────────────────────────

  - name: "RA-12: Adding agent without Home Folder auto-assigns ~/.odyssey/residents/{slug}"
    description: |
      When an agent is added to Residents via the sheet and it has no
      defaultWorkingDirectory set, the sheet automatically assigns
      Agent.defaultHomePath(for: agent.name) = ~/.odyssey/residents/{slug}.

      This fixes the bug where agents with no defaultWorkingDirectory would
      have resident chats run in the project root instead of a dedicated folder.

      Steps: open the sheet, add an agent (tap first row), then start a new chat
      and verify the inspector shows a .odyssey/residents/ path.

      Note: Requires at least one non-resident agent without a pre-set home folder.
      Skip if all non-residents already have defaultWorkingDirectory set.
    steps:
      # Open sheet and add first non-resident agent
      - act:
          action: setState
          path: appState.showAddResidentSheet
          value: true
      - interact:
          action: waitFor
          condition: element
          selector: '@testId("addResidentSheet.list")'
          timeout: 3000
      - interact:
          action: tap
          selector: '@index(0, @type("Button"))'
      - interact:
          action: screenshot
          label: "after-add-agent"
      # Close sheet
      - act:
          action: setState
          path: appState.showAddResidentSheet
          value: false
      # Start new chat from the resident row that was just added
      - interact:
          action: tap
          selector: '@testId("sidebar.residentAgent.newChat")'
      - interact:
          action: waitFor
          condition: element
          selector: '@testId("chat.messageInput")'
          timeout: 5000
      # Open inspector
      - interact:
          action: tap
          selector: '@testId("mainWindow.inspectorToggle")'
      - interact:
          action: screenshot
          label: "workspace-after-auto-assign"
    assert:
      - element_exists: '@testId("chat.messageInput")'
      # The auto-assigned home folder must contain .odyssey/residents/
      - screenshot_contains: ".odyssey/residents/"
